openapi: 3.0.3
info:
  title: VendorProof API
  version: 1.0.0
  description: API documentation for the VendorProof backend.
tags:
  - name: Auth
  - name: Business
  - name: Config
  - name: System
  - name: Triangle
paths:
  /api/auth/signup/step-1:
    post:
      summary: Start signup and send OTP
      description: Creates a user profile and sends a verification OTP to the phone number.
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignUpStep1Request"
      responses:
        "200":
          description: OTP sent successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SignUpStep1SuccessResponse"
        "400":
          description: Duplicate user data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                status: error
                statusCode: 400
                message: Email or phone number already exists, login instead.
                timestamp: "2026-05-10T12:00:00.000Z"

  /api/auth/signup/step-2:
    post:
      summary: Verify signup OTP
      description: Verifies OTP from step 1 and returns an access token with the next signup step.
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignUpStep2Request"
      responses:
        "200":
          description: OTP verified successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SignUpStep2SuccessResponse"
        "401":
          description: Invalid or expired OTP
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                invalidOtp:
                  value:
                    status: error
                    statusCode: 401
                    message: Invalid OTP
                    timestamp: "2026-05-10T12:00:00.000Z"
                expiredOtp:
                  value:
                    status: error
                    statusCode: 401
                    message: OTP has expired
                    timestamp: "2026-05-10T12:00:00.000Z"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                status: error
                statusCode: 404
                message: User not found
                timestamp: "2026-05-10T12:00:00.000Z"

  /api/auth/signup/step-3:
    post:
      summary: Upload personal KYC documents
      description: Uploads selfie and identity document as part of signup.
      tags:
        - Auth
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/SignUpStep3Request"
      responses:
        "200":
          description: KYC documents uploaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SignUpStep3SuccessResponse"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/auth/signup/step-4:
    post:
      summary: Complete business profile and finalize signup
      description: Creates business profile, optional socials and bank details, and returns access token.
      tags:
        - Auth
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/SignUpStep4Request"
      responses:
        "201":
          description: Business created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SignUpStep4SuccessResponse"
        "400":
          description: Business name already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                status: error
                statusCode: 400
                message: Another business with the same name already exists, please choose a different name.
                timestamp: "2026-05-10T12:00:00.000Z"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/auth/signin:
    post:
      summary: Request signin OTP
      description: Sends login OTP. If signup is incomplete, response may include a next step.
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignInRequest"
      responses:
        "200":
          description: OTP sent
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/SignInSuccessResponse"
                  - $ref: "#/components/schemas/SignInIncompleteSignupResponse"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/auth/verify-signin-otp:
    post:
      summary: Verify signin OTP
      description: Verifies OTP and returns access token. If profile completion is pending, includes nextStep.
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifySignInOtpRequest"
      responses:
        "200":
          description: OTP verified
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/VerifySignInOtpSuccessResponse"
                  - $ref: "#/components/schemas/VerifySignInOtpIncompleteSignupResponse"
        "401":
          description: Invalid or expired OTP
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/auth/test-delete:
    delete:
      summary: Test delete endpoint for development
      description: Deletes user data for testing purposes. This endpoint should be removed in production.
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                phoneNumber:
                  type: string
                  example: +2348012345678
      responses:
        "200":
          description: User data deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  statusCode:
                    type: integer
                    example: 200
                  message:
                    type: string
                    example: User data deleted successfully
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/auth/user:
    get:
      summary: Get authenticated user profile
      description: Returns the authenticated user's profile along with their associated businesses.
      tags:
        - Auth
      security:
        - BearerAuth: []
      responses:
        "200":
          description: User profile retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetUserSuccessResponse"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/business/{slug}:
    get:
      summary: Get public business profile
      description: Returns the public profile of a business by its slug. No authentication required.
      tags:
        - Business
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
            example: ada-groceries-ltd
      responses:
        "200":
          description: Business profile retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetPublicProfileSuccessResponse"
        "404":
          description: Business not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                status: error
                statusCode: 404
                message: Business not found
                timestamp: "2026-05-10T12:00:00.000Z"

  /api/business/me:
    patch:
      summary: Update authenticated business profile
      description: Updates the business profile of the currently authenticated user. All fields are optional.
      tags:
        - Business
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/UpdateBusinessRequest"
      responses:
        "200":
          description: Business updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateBusinessSuccessResponse"
        "404":
          description: Business not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/business/me/socials:
    post:
      summary: Add a social link
      description: Adds a new social media link to the authenticated business. Each platform can only have one entry.
      tags:
        - Business
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddSocialRequest"
      responses:
        "201":
          description: Social link added successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AddSocialSuccessResponse"
        "400":
          description: Platform already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                status: error
                statusCode: 400
                message: A INSTAGRAM link already exists. Update or remove it first.
                timestamp: "2026-05-10T12:00:00.000Z"

  /api/business/me/socials/{id}:
    delete:
      summary: Remove a social link
      description: Deletes a social media link by its ID from the authenticated business.
      tags:
        - Business
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            example: 1
      responses:
        "200":
          description: Social link removed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RemoveSocialSuccessResponse"
        "404":
          description: Social link not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                status: error
                statusCode: 404
                message: Social link not found
                timestamp: "2026-05-10T12:00:00.000Z"

  /api/business/me/bank-details:
    post:
      summary: Add bank details
      description: Adds a new bank account to the authenticated business. Setting isPrimary to true will demote all other accounts.
      tags:
        - Business
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddBankDetailsRequest"
      responses:
        "201":
          description: Bank details added successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AddBankDetailsSuccessResponse"

  /api/business/me/bank-details/{id}:
    patch:
      summary: Update bank details
      description: Updates an existing bank account entry by ID. All fields are optional.
      tags:
        - Business
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBankDetailsRequest"
      responses:
        "200":
          description: Bank details updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateBankDetailsSuccessResponse"
        "404":
          description: Bank details not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                status: error
                statusCode: 404
                message: Bank details not found
                timestamp: "2026-05-10T12:00:00.000Z"
    delete:
      summary: Remove bank details
      description: Deletes a bank account entry by ID from the authenticated business.
      tags:
        - Business
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            example: 1
      responses:
        "200":
          description: Bank details removed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RemoveBankDetailsSuccessResponse"
        "404":
          description: Bank details not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                status: error
                statusCode: 404
                message: Bank details not found
                timestamp: "2026-05-10T12:00:00.000Z"

  /api/config:
    get:
      summary: Get frontend configuration values
      tags:
        - Config
      responses:
        "200":
          description: Configurations retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetConfigsSuccessResponse"

  /api/health:
    get:
      summary: Health check endpoint
      tags:
        - System
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthSuccessResponse"
        "500":
          description: Service is unhealthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                status: error
                statusCode: 500
                message: API health check failed
                timestamp: "2026-05-10T12:00:00.000Z"

  /api/triangle/area:
    post:
      summary: Calculate triangle area
      tags:
        - Triangle
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TriangleAreaRequest"
      responses:
        "200":
          description: Triangle area calculated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TriangleAreaSuccessResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    ErrorResponse:
      type: object
      properties:
        status:
          type: string
          example: error
        statusCode:
          type: integer
          example: 400
        message:
          type: string
          example: Validation Error
        timestamp:
          type: string
          format: date-time

    SignUpStep1Request:
      type: object
      required:
        - firstName
        - lastName
        - phoneNumber
      properties:
        firstName:
          type: string
          example: Ada
        lastName:
          type: string
          example: Okafor
        email:
          type: string
          format: email
          example: ada@vendorproof.app
        phoneNumber:
          type: string
          example: +2348012345678

    SignUpStep1SuccessResponse:
      type: object
      properties:
        status:
          type: string
          example: success
        statusCode:
          type: integer
          example: 200
        message:
          type: string
          example: OTP sent to registered phone number
        data:
          type: object
          properties:
            nextStep:
              type: integer
              example: 2

    SignUpStep2Request:
      type: object
      required:
        - phoneNumber
        - otpCode
      properties:
        phoneNumber:
          type: string
          example: +2348012345678
        otpCode:
          type: string
          example: "123456"

    SignUpStep2SuccessResponse:
      type: object
      properties:
        status:
          type: string
          example: success
        statusCode:
          type: integer
          example: 200
        message:
          type: string
          example: OTP verified successfully
        data:
          type: object
          properties:
            accessToken:
              type: string
              example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
            nextStep:
              type: integer
              example: 3

    SignUpStep3Request:
      type: object
      properties:
        kycSelfie:
          type: string
          format: binary
          description: Personal selfie image for KYC.
        kycIdDocument:
          type: string
          format: binary
          description: Identity document image for KYC.

    SignUpStep3SuccessResponse:
      type: object
      properties:
        status:
          type: string
          example: success
        statusCode:
          type: integer
          example: 200
        message:
          type: string
          example: KYC documents uploaded successfully
        data:
          type: object
          properties:
            nextStep:
              type: integer
              example: 4

    SignUpStep4Request:
      type: object
      required:
        - businessName
      properties:
        businessName:
          type: string
          example: Ada Groceries Ltd
        businessDescription:
          type: string
          example: Retail grocery supplier for households and restaurants.
        businessEmail:
          type: string
          format: email
          example: hello@adagroceries.com
        businessPhoneNumber:
          type: string
          example: +2348012345678
        businessAlternativePhoneNumber:
          type: string
          example: +2348098765432
        businessCategory:
          type: string
          example: Retail
        socials:
          type: string
          description: JSON string array of socials.
          example: '[{"platform":"INSTAGRAM","url":"https://instagram.com/adagroceries"}]'
        bankDetails:
          type: string
          description: JSON string object for bank details.
          example: '{"accountName":"Ada Groceries Ltd","accountNumber":"0123456789","bankName":"Mock Bank","bankCode":"999"}'
        businessLogo:
          type: string
          format: binary
          description: Single business logo image.
        businessShowCaseImages:
          type: array
          description: Up to 10 showcase images.
          items:
            type: string
            format: binary
        kycBusinessCacDocument:
          type: string
          format: binary
          description: CAC document image for business verification.
        kycBusinessTinNumber:
          type: string
          description: TIN value used when CAC document is not provided.
          example: 12345678-0001

    SignUpStep4SuccessResponse:
      type: object
      properties:
        status:
          type: string
          example: success
        statusCode:
          type: integer
          example: 201
        message:
          type: string
          example: Business created successfully
        data:
          type: object
          properties:
            accessToken:
              type: string
              example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...

    SignInRequest:
      type: object
      required:
        - phoneNumber
      properties:
        phoneNumber:
          type: string
          example: +2348012345678

    SignInSuccessResponse:
      type: object
      properties:
        status:
          type: string
          example: success
        statusCode:
          type: integer
          example: 200
        message:
          type: string
          example: OTP sent to your phone number

    SignInIncompleteSignupResponse:
      type: object
      properties:
        status:
          type: string
          example: success
        statusCode:
          type: integer
          example: 200
        message:
          type: string
          example: OTP sent to registered phone number
        data:
          type: object
          properties:
            nextStep:
              type: integer
              example: 2

    VerifySignInOtpRequest:
      type: object
      required:
        - phoneNumber
        - otp
      properties:
        phoneNumber:
          type: string
          example: +2348012345678
        otp:
          type: string
          example: "123456"

    VerifySignInOtpSuccessResponse:
      type: object
      properties:
        status:
          type: string
          example: success
        statusCode:
          type: integer
          example: 200
        message:
          type: string
          example: OTP verified successfully
        data:
          type: object
          properties:
            accessToken:
              type: string
              example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...

    VerifySignInOtpIncompleteSignupResponse:
      type: object
      properties:
        status:
          type: string
          example: success
        statusCode:
          type: integer
          example: 200
        message:
          type: string
          example: Please complete your profile by providing KYC documents
        data:
          type: object
          properties:
            nextStep:
              type: integer
              enum:
                - 3
                - 4
              example: 3
            accessToken:
              type: string
              example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...

    GetConfigsSuccessResponse:
      type: object
      properties:
        status:
          type: string
          example: success
        statusCode:
          type: integer
          example: 200
        message:
          type: string
          example: Configurations retrieved successfully
        data:
          type: object
          properties:
            tierNames:
              type: array
              items:
                type: string
              example:
                - UNVERIFIED
                - BRONZE
                - SILVER
                - GOLD
                - PLATINUM
                - DIAMOND
            socials:
              type: array
              items:
                type: string
              example:
                - FACEBOOK
                - TWITTER
                - LINKEDIN
                - INSTAGRAM
                - TIKTOK
                - YOUTUBE
                - WEBSITE
                - OTHER
            businessVerificationTypes:
              type: array
              items:
                type: string
              example:
                - CAC
                - NIN
                - UTILITY_BILL
                - SELFIE
                - TIN
                - OTHER

    HealthSuccessResponse:
      type: object
      properties:
        status:
          type: string
          example: success
        statusCode:
          type: integer
          example: 200
        message:
          type: string
          example: API is healthy
        data:
          nullable: true
          example: null

    TriangleAreaRequest:
      type: object
      required:
        - base
        - height
      properties:
        base:
          type: number
          example: 10
        height:
          type: number
          example: 5

    TriangleAreaSuccessResponse:
      type: object
      properties:
        status:
          type: string
          example: success
        statusCode:
          type: integer
          example: 200
        message:
          type: string
          example: Triangle area calculated successfully
        data:
          type: object
          properties:
            area:
              type: number
              example: 25
        meta:
          nullable: true
          example: null

    GetUserSuccessResponse:
      type: object
      properties:
        status:
          type: string
          example: success
        statusCode:
          type: integer
          example: 200
        data:
          type: object
          properties:
            id:
              type: integer
              example: 1
            firstName:
              type: string
              example: Ada
            lastName:
              type: string
              example: Okafor
            email:
              type: string
              format: email
              example: ada@vendorproof.app
            phoneNumber:
              type: string
              example: +2348012345678
            businesses:
              type: array
              items:
                $ref: "#/components/schemas/BusinessSummary"

    BusinessSummary:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Ada Groceries Ltd
        slug:
          type: string
          example: ada-groceries-ltd
        logo:
          type: string
          nullable: true
          example: https://res.cloudinary.com/demo/image/upload/logo.jpg
        kycStatus:
          type: string
          example: PENDING
        showCaseImages:
          type: array
          items:
            type: string
          example:
            - https://res.cloudinary.com/demo/image/upload/img1.jpg
        socials:
          type: array
          items:
            $ref: "#/components/schemas/Social"
        category:
          type: string
          nullable: true
          example: Retail
        trustScore:
          type: number
          example: 72.5

    Social:
      type: object
      properties:
        id:
          type: integer
          example: 1
        platform:
          type: string
          example: INSTAGRAM
        url:
          type: string
          example: https://instagram.com/adagroceries

    BankDetails:
      type: object
      properties:
        id:
          type: integer
          example: 1
        bankName:
          type: string
          example: Mock Bank
        accountNumber:
          type: string
          example: "0123456789"
        accountName:
          type: string
          example: Ada Groceries Ltd
        isPrimary:
          type: boolean
          example: true

    GetPublicProfileSuccessResponse:
      type: object
      properties:
        status:
          type: string
          example: success
        statusCode:
          type: integer
          example: 200
        data:
          type: object
          properties:
            id:
              type: integer
              example: 1
            name:
              type: string
              example: Ada Groceries Ltd
            description:
              type: string
              nullable: true
              example: Retail grocery supplier for households and restaurants.
            logo:
              type: string
              nullable: true
              example: https://res.cloudinary.com/demo/image/upload/logo.jpg
            showCaseImages:
              type: array
              items:
                type: string
              example:
                - https://res.cloudinary.com/demo/image/upload/img1.jpg
            email:
              type: string
              nullable: true
              example: hello@adagroceries.com
            phoneNumber:
              type: string
              nullable: true
              example: +2348012345678
            alternativePhoneNumber:
              type: string
              nullable: true
              example: +2348098765432
            category:
              type: string
              nullable: true
