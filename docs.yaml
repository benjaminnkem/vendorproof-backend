openapi: 3.0.3
info:
  title: VendorProof API
  version: 1.0.0
  description: API documentation for the VendorProof backend.
tags:
  - name: Auth
  - name: Business
  - name: Config
  - name: System
  - name: Triangle
  - name: Pay
paths:
  /api/auth/signup/step-1:
    post:
      summary: Start signup and send OTP
      description: Creates a user profile and sends a verification OTP to the phone number.
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignUpStep1Request"
      responses:
        "200":
          description: OTP sent successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SignUpStep1SuccessResponse"
        "400":
          description: Duplicate user data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                status: error
                statusCode: 400
                message: Email or phone number already exists, login instead.
                timestamp: "2026-05-10T12:00:00.000Z"

  /api/auth/signup/step-2:
    post:
      summary: Verify signup OTP
      description: Verifies OTP from step 1 and returns an access token with the next signup step.
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignUpStep2Request"
      responses:
        "200":
          description: OTP verified successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SignUpStep2SuccessResponse"
        "401":
          description: Invalid or expired OTP
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                invalidOtp:
                  value:
                    status: error
                    statusCode: 401
                    message: Invalid OTP
                    timestamp: "2026-05-10T12:00:00.000Z"
                expiredOtp:
                  value:
                    status: error
                    statusCode: 401
                    message: OTP has expired
                    timestamp: "2026-05-10T12:00:00.000Z"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                status: error
                statusCode: 404
                message: User not found
                timestamp: "2026-05-10T12:00:00.000Z"

  /api/auth/signup/step-3:
    post:
      summary: Upload personal KYC documents
      description: Uploads selfie and identity document as part of signup.
      tags:
        - Auth
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/SignUpStep3Request"
      responses:
        "200":
          description: KYC documents uploaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SignUpStep3SuccessResponse"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/auth/signup/step-4:
    post:
      summary: Complete business profile and finalize signup
      description: Creates business profile, optional socials and bank details, and returns access token.
      tags:
        - Auth
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/SignUpStep4Request"
      responses:
        "201":
          description: Business created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SignUpStep4SuccessResponse"
        "400":
          description: Business name already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                status: error
                statusCode: 400
                message: Another business with the same name already exists, please choose a different name.
                timestamp: "2026-05-10T12:00:00.000Z"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/auth/signin:
    post:
      summary: Request signin OTP
      description: Sends login OTP. If signup is incomplete, response may include a next step.
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignInRequest"
      responses:
        "200":
          description: OTP sent
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/SignInSuccessResponse"
                  - $ref: "#/components/schemas/SignInIncompleteSignupResponse"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/auth/verify-signin-otp:
    post:
      summary: Verify signin OTP
      description: Verifies OTP and returns access token. If profile completion is pending, includes nextStep.
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifySignInOtpRequest"
      responses:
        "200":
          description: OTP verified
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/VerifySignInOtpSuccessResponse"
                  - $ref: "#/components/schemas/VerifySignInOtpIncompleteSignupResponse"
        "401":
          description: Invalid or expired OTP
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/auth/test-delete:
    delete:
      summary: Test delete endpoint for development
      description: Deletes user data for testing purposes. This endpoint should be removed in production.
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                phoneNumber:
                  type: string
                  example: +2348012345678
      responses:
        "200":
          description: User data deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  statusCode:
                    type: integer
                    example: 200
                  message:
                    type: string
                    example: User data deleted successfully
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/auth/user:
    get:
      summary: Get authenticated user profile
      description: Returns the authenticated user's profile along with their associated businesses.
      tags:
        - Auth
      security:
        - BearerAuth: []
      responses:
        "200":
          description: User profile retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetUserSuccessResponse"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/business/{slug}:
    get:
      summary: Get public business profile
      description: Returns the public profile of a business by its slug. No authentication required.
      tags:
        - Business
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
            example: ada-groceries-ltd
      responses:
        "200":
          description: Business profile retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetPublicProfileSuccessResponse"
        "404":
          description: Business not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                status: error
                statusCode: 404
                message: Business not found
                timestamp: "2026-05-10T12:00:00.000Z"

  /api/business/me:
    patch:
      summary: Update authenticated business profile
      description: Updates the business profile of the currently authenticated user. All fields are optional.
      tags:
        - Business
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/UpdateBusinessRequest"
      responses:
        "200":
          description: Business updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateBusinessSuccessResponse"
        "404":
          description: Business not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/business/me/socials:
    post:
      summary: Add a social link
      description: Adds a new social media link to the authenticated business. Each platform can only have one entry.
      tags:
        - Business
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddSocialRequest"
      responses:
        "201":
          description: Social link added successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AddSocialSuccessResponse"
        "400":
          description: Platform already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                status: error
                statusCode: 400
                message: A INSTAGRAM link already exists. Update or remove it first.
                timestamp: "2026-05-10T12:00:00.000Z"

  /api/business/me/socials/{id}:
    delete:
      summary: Remove a social link
      description: Deletes a social media link by its ID from the authenticated business.
      tags:
        - Business
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            example: 1
      responses:
        "200":
          description: Social link removed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RemoveSocialSuccessResponse"
        "404":
          description: Social link not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                status: error
                statusCode: 404
                message: Social link not found
                timestamp: "2026-05-10T12:00:00.000Z"

  /api/business/me/bank-details:
    post:
      summary: Add bank details
      description: Adds a new bank account to the authenticated business. Setting isPrimary to true will demote all other accounts.
      tags:
        - Business
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddBankDetailsRequest"
      responses:
        "201":
          description: Bank details added successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AddBankDetailsSuccessResponse"

  /api/business/me/bank-details/{id}:
    patch:
      summary: Update bank details
      description: Updates an existing bank account entry by ID. All fields are optional.
      tags:
        - Business
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBankDetailsRequest"
      responses:
        "200":
          description: Bank details updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateBankDetailsSuccessResponse"
        "404":
          description: Bank details not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                status: error
                statusCode: 404
                message: Bank details not found
                timestamp: "2026-05-10T12:00:00.000Z"
    delete:
      summary: Remove bank details
      description: Deletes a bank account entry by ID from the authenticated business.
      tags:
        - Business
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            example: 1
      responses:
        "200":
          description: Bank details removed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RemoveBankDetailsSuccessResponse"
        "404":
          description: Bank details not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                status: error
                statusCode: 404
                message: Bank details not found
                timestamp: "2026-05-10T12:00:00.000Z"

  /api/config:
    get:
      summary: Get frontend configuration values
      tags:
        - Config
      responses:
        "200":
          description: Configurations retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetConfigsSuccessResponse"

  /api/health:
    get:
      summary: Health check endpoint
      tags:
        - System
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthSuccessResponse"
        "500":
          description: Service is unhealthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                status: error
                statusCode: 500
                message: API health check failed
                timestamp: "2026-05-10T12:00:00.000Z"

  /api/triangle/area:
    post:
      summary: Calculate triangle area
      tags:
        - Triangle
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TriangleAreaRequest"
      responses:
        "200":
          description: Triangle area calculated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TriangleAreaSuccessResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/business/me/payment-link:
    get:
      summary: Get generic payment link
      description: Returns the business's persistent generic payment link, creating it if it does not exist yet.
      tags:
        - Business
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Payment link retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetGenericPaymentLinkSuccessResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                status: error
                statusCode: 401
                message: Unauthorized
                timestamp: "2026-05-10T12:00:00.000Z"

  /api/business/me/payment-links/quick:
    get:
      summary: List quick payment links
      description: Returns all quick one-time payment links created by the authenticated business, ordered by most recent.
      tags:
        - Business
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Quick links retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListQuickLinksSuccessResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                status: error
                statusCode: 401
                message: Unauthorized
                timestamp: "2026-05-10T12:00:00.000Z"
    post:
      summary: Create a quick one-time payment link
      description: Generates a one-time payment link with an optional fixed amount, description, and expiry.
      tags:
        - Business
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateQuickLinkRequest"
      responses:
        "201":
          description: Quick link created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateQuickLinkSuccessResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                status: error
                statusCode: 401
                message: Unauthorized
                timestamp: "2026-05-10T12:00:00.000Z"

  /api/business/me/payment-links/quick/{id}:
    delete:
      summary: Delete a quick payment link
      description: Permanently deletes a quick payment link owned by the authenticated business.
      tags:
        - Business
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            example: 10
      responses:
        "200":
          description: Quick link deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  statusCode:
                    type: integer
                    example: 200
                  message:
                    type: string
                    example: Quick link deleted
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                status: error
                statusCode: 401
                message: Unauthorized
                timestamp: "2026-05-10T12:00:00.000Z"
        "404":
          description: Quick link not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                status: error
                statusCode: 404
                message: Quick link not found
                timestamp: "2026-05-10T12:00:00.000Z"

  /api/business/me/services:
    get:
      summary: List services
      description: Returns all services created by the authenticated business, ordered by most recent.
      tags:
        - Business
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Services retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListServicesSuccessResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                status: error
                statusCode: 401
                message: Unauthorized
                timestamp: "2026-05-10T12:00:00.000Z"
    post:
      summary: Create a service
      description: Creates a new service with a dedicated payment link. Optionally links a bank account for payouts.
      tags:
        - Business
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateServiceRequest"
      responses:
        "201":
          description: Service created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateServiceSuccessResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                status: error
                statusCode: 401
                message: Unauthorized
                timestamp: "2026-05-10T12:00:00.000Z"
        "404":
          description: Bank account not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                status: error
                statusCode: 404
                message: Bank account not found
                timestamp: "2026-05-10T12:00:00.000Z"

  /api/business/me/services/{id}:
    patch:
      summary: Update a service
      description: Updates an existing service by ID. All fields are optional.
      tags:
        - Business
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateServiceRequest"
      responses:
        "200":
          description: Service updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateServiceSuccessResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                status: error
                statusCode: 401
                message: Unauthorized
                timestamp: "2026-05-10T12:00:00.000Z"
        "404":
          description: Service or bank account not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                status: error
                statusCode: 404
                message: Service not found
                timestamp: "2026-05-10T12:00:00.000Z"
    delete:
      summary: Delete a service
      description: Permanently deletes a service by ID from the authenticated business.
      tags:
        - Business
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            example: 1
      responses:
        "200":
          description: Service deleted successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteServiceSuccessResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                status: error
                statusCode: 401
                message: Unauthorized
                timestamp: "2026-05-10T12:00:00.000Z"
        "404":
          description: Service not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                status: error
                statusCode: 404
                message: Service not found
                timestamp: "2026-05-10T12:00:00.000Z"

  /api/pay/verify/{squadRef}:
    get:
      summary: Verify a payment
      description: Checks the status of a payment by its Squad transaction reference. If the payment is pending and Squad confirms it server-side, the status is updated to COMPLETED immediately. Returns a rating token when the service has already been rendered.
      tags:
        - Pay
      parameters:
        - in: path
          name: squadRef
          required: true
          schema:
            type: string
            example: SQCHIZ12345678
      responses:
        "200":
          description: Payment status returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerifyPaymentSuccessResponse"
        "400":
          description: Payment failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                status: error
                statusCode: 400
                message: Payment failed
                timestamp: "2026-05-10T12:00:00.000Z"
        "404":
          description: Payment not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                status: error
                statusCode: 404
                message: Payment not found
                timestamp: "2026-05-10T12:00:00.000Z"

  /api/pay/webhook/squad:
    post:
      summary: Squad payment webhook
      description: Receives payment event notifications from Squad. The request body is verified using the `x-squad-encrypted-body` HMAC signature header before processing. This endpoint is called by Squad — not by your frontend.
      tags:
        - Pay
      parameters:
        - in: header
          name: x-squad-encrypted-body
          required: true
          schema:
            type: string
            example: "abc123hmacsha512hash"
          description: HMAC-SHA512 signature of the raw request body, provided by Squad.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Event:
                  type: string
                  example: charge_completed
                Body:
                  type: object
                  properties:
                    transaction_ref:
                      type: string
                      example: SQCHIZ12345678
                    transaction_status:
                      type: string
                      example: success
      responses:
        "200":
          description: Webhook processed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
        "401":
          description: Invalid webhook signature
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                status: error
                statusCode: 401
                message: Invalid webhook signature
                timestamp: "2026-05-10T12:00:00.000Z"

  /api/pay/rate/{ratingToken}:
    get:
      summary: Get rating page data
      description: Returns payment and business details needed to render the buyer rating page. Fails if the link is expired or has already been rated.
      tags:
        - Pay
      parameters:
        - in: path
          name: ratingToken
          required: true
          schema:
            type: string
            example: abc123xyz
      responses:
        "200":
          description: Rating page data retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetRatingPageSuccessResponse"
        "400":
          description: Rating already submitted or link expired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                status: error
                statusCode: 400
                message: You have already submitted a rating
                timestamp: "2026-05-10T12:00:00.000Z"
        "404":
          description: Rating link not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                status: error
                statusCode: 404
                message: Rating link not found
                timestamp: "2026-05-10T12:00:00.000Z"
    post:
      summary: Submit a vendor rating
      description: Submits a buyer rating (1–5) for a vendor. Updates the vendor's trust score and marks the payment as completed.
      tags:
        - Pay
      parameters:
        - in: path
          name: ratingToken
          required: true
          schema:
            type: string
            example: abc123xyz
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitRatingRequest"
      responses:
        "200":
          description: Rating submitted successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubmitRatingSuccessResponse"
        "400":
          description: Rating already submitted or link expired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                status: error
                statusCode: 400
                message: You have already submitted a rating
                timestamp: "2026-05-10T12:00:00.000Z"
        "404":
          description: Rating link not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                status: error
                statusCode: 404
                message: Rating link not found
                timestamp: "2026-05-10T12:00:00.000Z"

  /api/pay/{token}:
    get:
      summary: Get payment page data
      description: Returns the business profile and payment link details needed to render the buyer checkout page. Validates that the link is active and not expired.
      tags:
        - Pay
      parameters:
        - in: path
          name: token
          required: true
          schema:
            type: string
            example: abc123xyz
      responses:
        "200":
          description: Payment page data retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetPaymentPageSuccessResponse"
        "400":
          description: Payment link already used or expired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                status: error
                statusCode: 400
                message: This payment link has already been used
                timestamp: "2026-05-10T12:00:00.000Z"
        "404":
          description: Payment link not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                status: error
                statusCode: 404
                message: Payment link not found
                timestamp: "2026-05-10T12:00:00.000Z"
    post:
      summary: Initiate a payment
      description: Records a payment against a payment link. If the service has already been rendered, a rating token is returned immediately; otherwise the buyer receives an email when the service is delivered.
      tags:
        - Pay
      parameters:
        - in: path
          name: token
          required: true
          schema:
            type: string
            example: abc123xyz
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InitiatePaymentRequest"
      responses:
        "201":
          description: Payment recorded successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InitiatePaymentSuccessResponse"
        "400":
          description: Link already used, expired, or amount missing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                status: error
                statusCode: 400
                message: Amount is required for this payment link
                timestamp: "2026-05-10T12:00:00.000Z"
        "404":
          description: Payment link not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                status: error
                statusCode: 404
                message: Payment link not found
                timestamp: "2026-05-10T12:00:00.000Z"

