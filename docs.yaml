openapi: 3.0.3
info:
  title: VendorProof API
  version: 1.0.0
  description: API documentation for the VendorProof backend.
paths:
  /api/auth/signup:
    post:
      summary: Register a new vendor account and business profile
      tags:
        - Auth
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - firstName
                - lastName
                - email
                - phoneNumber
                - businessName
              properties:
                firstName:
                  type: string
                  example: Ada
                lastName:
                  type: string
                  example: Okafor
                email:
                  type: string
                  format: email
                  example: ada@vendorproof.app
                phoneNumber:
                  type: string
                  example: +2348012345678
                businessName:
                  type: string
                  example: Ada Groceries Ltd
                businessDescription:
                  type: string
                  example: Retail grocery supplier for households and restaurants.
                businessEmail:
                  type: string
                  format: email
                  example: hello@adagroceries.com
                businessPhoneNumber:
                  type: string
                  example: +2348012345678
                businessAlternativePhoneNumber:
                  type: string
                  example: +2348098765432
                businessCategory:
                  type: string
                  example: Retail
                socials:
                  type: string
                  description: JSON string array of socials.
                  example: '[{"platform":"INSTAGRAM","url":"https://instagram.com/adagroceries"}]'
                bankDetails:
                  type: string
                  description: JSON string object for bank details.
                  example: '{"accountName":"Ada Groceries Ltd","accountNumber":"0123456789","bankName":"Mock Bank","bankCode":"999"}'
                businessLogo:
                  type: string
                  format: binary
                  description: Single business logo image.
                businessShowCaseImages:
                  type: array
                  description: Up to 10 showcase images.
                  items:
                    type: string
                    format: binary
                kycSelfie:
                  type: string
                  format: binary
                  description: Personal selfie for KYC verification.
                kycIdDocument:
                  type: string
                  format: binary
                  description: NIN or other valid identity document image.
                kycBusinessCacDocument:
                  type: string
                  format: binary
                  description: CAC document image for business verification.
                kycBusinessTinNumber:
                  type: string
                  description: TIN value used when CAC document is not provided.
                  example: 12345678-0001
      responses:
        "201":
          description: Account created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  statusCode:
                    type: integer
                    example: 201
                  message:
                    type: string
                    example: Account created successfully
        "400":
          description: Validation failure or duplicate email
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: error
                  statusCode:
                    type: integer
                    example: 400
                  message:
                    type: string
                    example: Email already exists
        "422":
          description: Schema validation error
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: error
                  statusCode:
                    type: integer
                    example: 422
                  message:
                    type: string
                    example: Validation failed
                  errors:
                    type: array
                    items:
                      type: object
                      properties:
                        path:
                          type: array
                          items:
                            type: string
                        message:
                          type: string
      description: >-
        Creates user and business records. KYC files and TIN are accepted at signup,
        then processed asynchronously by the BullMQ KYC queue.

  /api/auth/signin:
    post:
      summary: Request login OTP with phone number
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - phoneNumber
              properties:
                phoneNumber:
                  type: string
                  example: +2348012345678
      responses:
        "200":
          description: OTP sent to registered phone number
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  statusCode:
                    type: integer
                    example: 200
                  message:
                    type: string
                    example: OTP sent to registered phone number
        "404":
          description: User not found for the supplied phone number
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: error
                  statusCode:
                    type: integer
                    example: 404
                  message:
                    type: string
                    example: User not found
        "422":
          description: Schema validation error
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: error
                  statusCode:
                    type: integer
                    example: 422
                  message:
                    type: string
                    example: Validation failed
                  errors:
                    type: array
                    items:
                      type: object
                      properties:
                        path:
                          type: array
                          items:
                            type: string
                        message:
                          type: string

  /api/auth/verify-signin-otp:
    post:
      summary: Verify login OTP and issue access token
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - phoneNumber
                - otp
              properties:
                phoneNumber:
                  type: string
                  example: +2348012345678
                otp:
                  type: string
                  example: "123456"
      responses:
        "200":
          description: OTP verified successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  statusCode:
                    type: integer
                    example: 200
                  message:
                    type: string
                    example: OTP verified successfully
                  data:
                    type: object
                    properties:
                      accessToken:
                        type: string
                        example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        "401":
          description: OTP is invalid or expired
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: error
                  statusCode:
                    type: integer
                    example: 401
                  message:
                    type: string
                    example: Invalid OTP
        "404":
          description: User not found for the supplied phone number
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: error
                  statusCode:
                    type: integer
                    example: 404
                  message:
                    type: string
                    example: User not found
        "422":
          description: Schema validation error
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: error
                  statusCode:
                    type: integer
                    example: 422
                  message:
                    type: string
                    example: Validation failed
                  errors:
                    type: array
                    items:
                      type: object
                      properties:
                        path:
                          type: array
                          items:
                            type: string
                        message:
                          type: string
  /api/health:
    get:
      summary: Health check endpoint
      tags:
        - System
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  statusCode:
                    type: integer
                    example: 200
                  message:
                    type: string
                    example: API is healthy
                  data:
                    nullable: true
                    example: null
        "500":
          description: Service is unhealthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: API health check failed
                  statusCode:
                    type: integer
                    example: 500
                  timestamp:
                    type: string
                    format: date-time
  /api/config:
    get:
      summary: Get frontend configuration values
      tags:
        - Config
      responses:
        "200":
          description: Configuration values retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  statusCode:
                    type: integer
                    example: 200
                  message:
                    type: string
                    example: Configurations retrieved successfully
                  data:
                    type: object
                    properties:
                      tierNames:
                        type: array
                        items:
                          type: string
                        example:
                          - FREE
                          - BASIC
                          - PREMIUM
                      socials:
                        type: array
                        items:
                          type: string
                        example:
                          - TWITTER
                          - INSTAGRAM
                          - LINKEDIN
                      businessVerificationTypes:
                        type: array
                        items:
                          type: string
                        example:
                          - CAC
                          - SELFIE
                          - UTILITY_BILL
