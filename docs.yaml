      properties:
        name:
          type: string
          example: Website Design
        description:
          type: string
          example: Full business website build
        amount:
          type: string
          description: Fixed price for this service. Pass as a numeric string.
          example: "150000"
        bankDetailsId:
          type: string
          description: ID of the bank account to receive payouts for this service. Pass as a numeric string.
          example: "1"

    CreateServiceSuccessResponse:
      type: object
      properties:
        status:
          type: string
          example: success
        statusCode:
          type: integer
          example: 201
        data:
          $ref: "#/components/schemas/ServiceItem"

    UpdateServiceRequest:
      type: object
      properties:
        name:
          type: string
          example: Website Design Pro
        description:
          type: string
          example: Full business website build with SEO
        amount:
          type: string
          description: Updated price. Pass as a numeric string.
          example: "200000"
        bankDetailsId:
          type: string
          description: Updated payout bank account ID. Pass as a numeric string.
          example: "2"

    UpdateServiceSuccessResponse:
      type: object
      properties:
        status:
          type: string
          example: success
        statusCode:
          type: integer
          example: 200
        data:
          $ref: "#/components/schemas/ServiceItem"

    DeleteServiceSuccessResponse:
      type: object
      properties:
        status:
          type: string
          example: success
        statusCode:
          type: integer
          example: 200
        message:
          type: string
          example: Service deleted

    GetPaymentPageSuccessResponse:
      type: object
      properties:
        status:
          type: string
          example: success
        statusCode:
          type: integer
          example: 200
        data:
          type: object
          properties:
            business:
              type: object
              properties:
                name:
                  type: string
                  example: Ada Groceries Ltd
                description:
                  type: string
                  nullable: true
                  example: Retail grocery supplier for households and restaurants.
                logo:
                  type: string
                  nullable: true
                  example: https://res.cloudinary.com/demo/image/upload/logo.jpg
                slug:
                  type: string
                  example: ada-groceries-ltd
                trustScore:
                  type: number
                  example: 72.5
                kycStatus:
                  type: string
                  example: VERIFIED
                tier:
                  type: object
                  nullable: true
                  properties:
                    name:
                      type: string
                      example: BRONZE
                trustScoreHistories:
                  type: array
                  items:
                    type: object
                    properties:
                      score:
                        type: number
                        example: 68.0
                      createdAt:
                        type: string
                        format: date-time
                        example: "2026-04-01T10:00:00.000Z"
            paymentLink:
              type: object
              properties:
                type:
                  type: string
                  enum:
                    - GENERIC
                    - SERVICE
                    - QUICK
                  example: GENERIC
                amount:
                  type: number
                  nullable: true
                  example: 5000
                description:
                  type: string
                  nullable: true
                  example: Logo design deposit
                isOneTime:
                  type: boolean
                  example: false

    InitiatePaymentRequest:
      type: object
      required:
        - buyerName
        - buyerEmail
      properties:
        buyerName:
          type: string
          example: Emeka Obi
        buyerEmail:
          type: string
          format: email
          example: emeka@example.com
        amount:
          type: string
          description: Required when the payment link has no fixed amount. Pass as a numeric string.
          example: "5000"
        isServiceRendered:
          type: string
          description: Pass "true" if the service has already been delivered. A rating token is returned immediately instead of waiting for an email.
          enum:
            - "true"
            - "false"
          example: "false"

    InitiatePaymentSuccessResponse:
      type: object
      properties:
        status:
          type: string
          example: success
        statusCode:
          type: integer
          example: 201
        data:
          type: object
          properties:
            paymentId:
              type: integer
              example: 42
            amount:
              type: number
              example: 5000
            isServiceRendered:
              type: boolean
              example: false
            ratingToken:
              type: string
              nullable: true
              description: Only present when isServiceRendered is true.
              example: null
            message:
              type: string
              example: Payment recorded. You will receive an email to rate this vendor after the service is delivered.

    GetRatingPageSuccessResponse:
      type: object
      properties:
        status:
          type: string
          example: success
        statusCode:
          type: integer
          example: 200
        data:
          type: object
          properties:
            paymentId:
              type: integer
              example: 42
            buyerName:
              type: string
              example: Emeka Obi
            amount:
              type: number
              example: 5000
            business:
              type: object
              properties:
                name:
                  type: string
                  example: Ada Groceries Ltd
                logo:
                  type: string
                  nullable: true
                  example: https://res.cloudinary.com/demo/image/upload/logo.jpg
                slug:
                  type: string
                  example: ada-groceries-ltd
                trustScore:
                  type: number
                  example: 72.5

    SubmitRatingRequest:
      type: object
      required:
        - rating
      properties:
        rating:
          type: integer
          minimum: 1
          maximum: 5
          example: 5
        comment:
          type: string
          example: Great service, very professional!

    SubmitRatingSuccessResponse:
      type: object
      properties:
        status:
          type: string
          example: success
        statusCode:
          type: integer
          example: 200
        data:
          type: object
          properties:
            message:
              type: string
              example: Thank you for your feedback!
            newTrustScore:
              type: number
              example: 75.5
